{% extends "base.html" %}
{% load static %}

{% block content %}
  <div class="container" style="max-width: 500px; margin: 50px auto; background: #1f1f1f; padding: 20px; border-radius: 10px; color: white;">
    <h2>Uploader une image</h2>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" style="padding: 10px; width: 100%; background: white; color: black; border-radius: 8px; font-weight: bold;">Publier</button>
    </form>
  </div>
{% endblock %}
